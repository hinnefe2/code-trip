# code-trip orchestrator config — copy to config.toml and edit.
#
# Voice routes by frontmost macOS app: when a terminal_apps app is focused,
# transcripts go to the active tmux pane (talk to Claude). Otherwise the
# transcript is pasted into the focused app (DICTATE-style).

[ssh]
# Required to drive a remote Claude session. Leave empty for paste-only use.
# host = "user@remote-host"
# options = ["-p", "2222"]

[tmux]
session = "claude"
window = "main"

[audio]
sample_rate = 16000
# device = 2            # mic device index from `python -m sounddevice` (optional)

[macropad]
# Physical macropad layout, left-to-right: PTT, YES, NO, ACT, NAV.
# Values are pynput Key attribute names (typically f13-f17).
ptt_key = "f13"
yes_key = "f14"
no_key  = "f15"
act_key = "f16"
nav_key = "f17"
# Hold NAV + ACT to rotate through these frontmost apps:
app_cycle = ["kitty", "Google Chrome", "Slack"]
# Apps where voice routes to the active tmux pane (talk to Claude).
# Anything else falls through to DICTATE-style paste.
terminal_apps = ["kitty"]

[stt]
# "openai" (default): PTT records a WAV and sends it to Whisper.
# "local":            PTT press-and-holds stt.local.hotkey so a local STT
#                     tool (e.g. Superwhisper) handles the recording.
provider = "openai"

[stt.local]
hotkey = "delete"        # key to forward while PTT is held (pynput Key name)

[openai]
# api_key = "sk-..."    # falls back to OPENAI_API_KEY env var
stt_model = "whisper-1"
tts_model = "gpt-4o-mini-tts"
tts_voice = "nova"
tts_speed = 1.15

[claude]
wait_timeout = 300.0
