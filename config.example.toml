# code-trip orchestrator config — copy to config.toml and edit.
#
# Voice routes by frontmost macOS app: when a terminal_apps app is focused,
# transcripts go to the active tmux pane (talk to Claude). Otherwise the
# transcript is pasted into the focused app (DICTATE-style).

[ssh]
# Required to drive a remote Claude session. Leave empty for paste-only use.
# host = "user@remote-host"
# options = ["-p", "2222"]

[tmux]
session = "claude"
window = "main"

[audio]
sample_rate = 16000
# device = 2            # mic device index from `python -m sounddevice` (optional)

[macropad]
# Physical macropad layout, left-to-right: PTT, YES, NO, ACT, NAV.
# Values are pynput Key attribute names (typically f13-f17).
ptt_key = "f13"
yes_key = "f14"
no_key  = "f15"
act_key = "f16"
nav_key = "f17"
# Hold NAV + ACT to rotate through these frontmost apps:
app_cycle = ["kitty", "Google Chrome", "Slack"]
# Apps where voice routes to the active tmux pane (talk to Claude).
# Anything else falls through to DICTATE-style paste.
terminal_apps = ["kitty"]

[stt]
# "openai" (default): PTT records a WAV and sends it to Whisper.
# "local":            PTT press-and-holds stt.local.hotkey so a local STT
#                     tool (e.g. Superwhisper) handles the recording.
provider = "openai"

[stt.local]
hotkey = "delete"        # key to forward while PTT is held (pynput Key name)

[openai]
# api_key = "sk-..."    # falls back to OPENAI_API_KEY env var
stt_model = "whisper-1"
tts_model = "gpt-4o-mini-tts"
tts_voice = "nova"
tts_speed = 1.15

[claude]
wait_timeout = 300.0

[email]
# Polling cadence for the claude.ai Gmail MCP (seconds).
poll_interval = 120.0
# Gmail search query. ``after:<unix_ts>`` is appended automatically; the
# default "unread Primary inbox, not from me" approximates an action-needed
# view and excludes Promotions/Updates/Social/Forums.
search_query = "in:inbox category:primary -from:me is:unread"
# Max threads per poll.
max_results = 20

[linear]
# Polling cadence for the claude.ai Linear MCP (seconds).
poll_interval = 180.0
# Issue ``statusType`` values eligible for the queue. Linear's enum is
# ``triage`` / ``backlog`` / ``unstarted`` / ``started`` / ``completed``
# / ``canceled``. Default surfaces anything actionable but not yet done.
state_types = ["triage", "unstarted", "started"]
# Max issues per poll (also the ``list_issues`` ``limit`` argument).
max_results = 50

[poll]
# Producers only poll between start_hour and end_hour (local time).
# Headless claude calls bill outside plan limits (per-call cost even
# while plan bars show green), so overnight polling is pure spend for
# an empty queue. Set both to the same value to disable the window.
start_hour = 7    # 7am
end_hour = 19     # 7pm
# How long (seconds) the MCP batcher collects concurrent tool calls
# before issuing one claude session for all of them. Producers poll on
# wall-clock-aligned ticks, so their calls land in the same window and
# share a session; interactive calls pay at most this much extra
# latency.
batch_window = 2.0

[autohandle]
# Let auto-handle-eligible skills (those declaring ``auto-handle: true``
# in their SKILL.md frontmatter) silently complete matching tasks
# before they reach the user-facing queue. Example: the
# ``accept-invite`` skill RSVPs to calendar-invite emails and archives
# them, with no spoken announcement.
#
# Disabled by default. Two-step opt-in: set ``enabled = true`` AND list
# the kinds you want auto-handled in ``kinds``. The kinds list is a
# whitelist; a skill that claims it handles a kind not in this list
# stays inert.
#
# ``dry_run = true`` runs the classifier (logging its decision) but
# always forwards the task to the user. Useful for watching decisions
# for a few days before trusting auto-execution.
enabled = false
dry_run = false
kinds = []     # e.g. ["email_msg"]
